}
function dbSet(path,val) {
  return fetch(DB_URL + path + '.json' + (authToken ? '?auth=' + authToken : ''), {
    method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(val)
  }).then(r => !!r.ok).catch(() => false);
}
function normalizeName(v) {
  return String(v||'').trim().replace(/\s+/g,' ');
}
function normalizeChef(v) {
  v = String(v||'').trim();
  return !v || v === 'המשפחה' ? 'יניב' : v;
}
function orderKey(cat) {
  return 'order_' + String(cat||'').replace(/[^֐-׿a-zA-Z0-9]/g,'_');
}
async function runImport() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  log('מתחיל התחברות...');
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({prompt:'select_account'});
  await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
  let result;
  try {
    result = await firebase.auth().signInWithPopup(provider);
  } catch (e) {
    log('שגיאת התחברות: ' + (e && e.message ? e.message : 'לא ידוע'));
    btn.disabled = false;
    return;
  }
  const user = result.user || firebase.auth().currentUser;
  if (!user) {
    log('לא זוהה משתמש');
    btn.disabled = false;
    return;
  }
  if ((user.email||'').toLowerCase() !== ADMIN_EMAIL || (user.uid||'') !== ADMIN_UID) {
    log('אין הרשאה לחשבון הזה');
    await firebase.auth().signOut();
    btn.disabled = false;
    return;
  }
  authToken = await user.getIdToken(true);
  log('התחברות בוצעה בהצלחה. טוען מתכונים קיימים...');
  const existing = await dbGet('/recipes') || {};
  const existingByName = new Map();
  let maxId = 0;
  Object.keys(existing).forEach(key => {
    const item = existing[key] || {};
    const nm = normalizeName(item.name);
    if (nm) existingByName.set(nm, key);
    const source = String(item.originalId || key || '');
    const m = source.match(/recipe-(\d+)/);
    if (m) maxId = Math.max(maxId, parseInt(m[1],10) || 0);
  });
  log('נמצאו ' + existingByName.size + ' מתכונים קיימים בענן.');
  let normalizedCount = 0;
  for (const [key,item] of Object.entries(existing)) {
    const by = normalizeChef(item.by);
    if (by !== (item.by||'')) {
      item.by = by;
      item.emoji = item.emoji || '';
      await dbSet('/recipes/' + key, item);
      normalizedCount++;
    }
  }
  if (normalizedCount) log('עודכנו ' + normalizedCount + ' מתכונים קיימים עם שם טבח תקין.');
  const ordersCache = {};
  async function appendOrder(cat, recipeKey) {
    const k = orderKey(cat);
    if (!(k in ordersCache)) {
      const current = await dbGet('/' + k);
      ordersCache[k] = current ? String(current).split(',').map(x => x.trim()).filter(Boolean) : [];
    }
    if (!ordersCache[k].includes(recipeKey)) ordersCache[k].push(recipeKey);
  }
  let added = 0, skipped = 0;
  for (const recipe of IMPORT_RECIPES) {
    const name = normalizeName(recipe.name);
    if (existingByName.has(name)) {
      skipped++;
      continue;
    }
    maxId++;
    const newKey = 'recipe-' + maxId;
    const payload = {
      originalId: newKey,
      name: recipe.name,
      cat: recipe.cat,
      emoji: '',
      by: normalizeChef(recipe.by),
      time: recipe.time || '',
      servings: recipe.servings || '',
      desc: recipe.desc || '',
      ingredients: recipe.ingredients || '',
      steps: recipe.steps || '',
      tip: recipe.tip || ''
    };
    const ok = await dbSet('/recipes/' + newKey, payload);
    if (!ok) {
      log('נכשלה כתיבה של המתכון: ' + recipe.name);
      continue;
    }
    await appendOrder(recipe.cat, newKey);
    existingByName.set(name, newKey);
    added++;
    log('נוסף: ' + recipe.name);
  }
  for (const [k, ids] of Object.entries(ordersCache)) {
    await dbSet('/' + k, ids.join(','));
  }
  log('');
  log('הייבוא הסתיים.');
  log('נוספו: ' + added);
  log('דולגו כי כבר קיימים: ' + skipped);
  log('עכשיו אפשר להעלות את קובץ האתר הקבוע, הענן בלבד.');
}
document.getElementById('runBtn').addEventListener('click', runImport);
</script>
</body>
