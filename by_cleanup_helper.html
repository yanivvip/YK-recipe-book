<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניקוי שדה טבח</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f0ea;
      color: #173f36;
    }
    .wrap {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      color: #2d6f5a;
      font-size: 44px;
      text-align: right;
    }
    p {
      line-height: 1.8;
      font-size: 24px;
      margin: 12px 0;
    }
    .actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: flex-start;
      margin-top: 24px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 26px;
      cursor: pointer;
      background: #2d6f5a;
      color: #fff;
      font-weight: 700;
    }
    button.secondary {
      background: #b8860b;
      color: #fff;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .status {
      margin-top: 28px;
      background: #101214;
      color: #e6f7ec;
      border-radius: 20px;
      padding: 24px;
      min-height: 160px;
      white-space: pre-wrap;
      font-size: 24px;
      line-height: 1.7;
    }
    .small {
      font-size: 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ניקוי שדה טבח בענן</h1>
    <p>הכלי הזה נועד לעדכן רק מתכונים שבהם שדה הטבח הוא המשפחה, או חסר, או ריק. במקרים האלה יישמר הערך יניב.</p>
    <p>הכלי עובד רק לחשבון הניהול שלך.</p>
    <p id="userLine" class="small">לא מחובר</p>
    <div class="actions">
      <button id="loginBtn">התחבר לחשבון הניהול</button>
      <button id="runBtn" class="secondary" disabled>הרץ ניקוי</button>
    </div>
    <div id="status" class="status">ממתין להתחברות</div>
  </div>

  <script>
    const ADMIN_EMAIL = 'yaniv.vip@gmail.com';
    const ADMIN_UID = 'g6k1XkiOHBQurWyl1F5irsJkBkI3';

    const firebaseConfig = {
      apiKey: 'AIzaSyB4V1zI64gfZkv5vxr3cn28rcL4BAZrHAU',
      authDomain: 'yk-recipe-book.firebaseapp.com',
      databaseURL: 'https://yk-recipe-book-default-rtdb.firebaseio.com',
      projectId: 'yk-recipe-book',
      storageBucket: 'yk-recipe-book.firebasestorage.app',
      messagingSenderId: '507367964896',
      appId: '1:507367964896:web:e2b9c850f4caa1ce0b8b45'
    };

    firebase.initializeApp(firebaseConfig);

    const loginBtn = document.getElementById('loginBtn');
    const runBtn = document.getElementById('runBtn');
    const statusEl = document.getElementById('status');
    const userLine = document.getElementById('userLine');

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function isAuthorized(user) {
      return !!user && user.email === ADMIN_EMAIL && user.uid === ADMIN_UID;
    }

    async function signIn() {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      try {
        await firebase.auth().signInWithPopup(provider);
      } catch (err) {
        setStatus('שגיאת התחברות\n' + (err && err.message ? err.message : String(err)));
      }
    }

    async function cleanupByField() {
      const user = firebase.auth().currentUser;
      if (!isAuthorized(user)) {
        setStatus('אין הרשאת ניהול לחשבון הזה');
        return;
      }
      runBtn.disabled = true;
      setStatus('קורא מתכונים מהענן');
      try {
        const snap = await firebase.database().ref('recipes').once('value');
        const data = snap.val() || {};
        const updates = {};
        let scanned = 0;
        let changed = 0;
        let alreadyOk = 0;

        Object.entries(data).forEach(([key, recipe]) => {
          scanned += 1;
          const current = recipe && typeof recipe.by === 'string' ? recipe.by.trim() : '';
          if (!current || current === 'המשפחה') {
            updates['recipes/' + key + '/by'] = 'יניב';
            changed += 1;
          } else {
            alreadyOk += 1;
          }
        });

        if (changed > 0) {
          setStatus('מעדכן מתכונים בענן');
          await firebase.database().ref().update(updates);
        }

        setStatus(
          'הניקוי הסתיים בהצלחה.\n\n' +
          'נסרקו: ' + scanned + '\n' +
          'עודכנו: ' + changed + '\n' +
          'כבר היו תקינים: ' + alreadyOk + '\n\n' +
          'עכשיו אפשר לחזור לאתר הראשי ולרענן.'
        );
      } catch (err) {
        setStatus('שגיאה בזמן ניקוי\n' + (err && err.message ? err.message : String(err)));
      } finally {
        runBtn.disabled = false;
      }
    }

    firebase.auth().onAuthStateChanged(async (user) => {
      if (user) {
        userLine.textContent = 'מחובר: ' + user.email;
      } else {
        userLine.textContent = 'לא מחובר';
      }

      if (!user) {
        runBtn.disabled = true;
        return;
      }

      if (!isAuthorized(user)) {
        runBtn.disabled = true;
        setStatus('התחברת, אבל זה לא חשבון הניהול המורשה.\n\nהחשבון המורשה הוא: ' + ADMIN_EMAIL);
        return;
      }

      runBtn.disabled = false;
      setStatus('התחברת בהצלחה כחשבון ניהול. אפשר להריץ ניקוי.');
    });

    loginBtn.addEventListener('click', signIn);
    runBtn.addEventListener('click', cleanupByField);
  </script>
</body>
</html>
